<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neek Scale</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2c2c54);
    color: white;
    margin: 0;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
}

.category {
    margin-top: 50px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
}

.category h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #00c2ff;
}

.question {
    margin: 20px 0;
}

.options button {
    margin: 5px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #3a3a6a;
    color: white;
    cursor: pointer;
}

.options button.selected {
    background: #00c2ff;
    color: black;
}

#submitBtn {
    display: block;
    margin: 40px auto;
    padding: 15px 25px;
    font-size: 18px;
    background: #00c2ff;
    color: black;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

#result {
    text-align: center;
    font-size: 24px;
    margin-top: 30px;
}
</style>
</head>

<body>

<div class="container">
<h1>Neek Scale Test</h1>

<div id="quiz"></div>

<button id="submitBtn" onclick="calculateScore()">Calculate Score</button>

<div id="result"></div>
</div>

<script>

const questions = [

/* SOCIAL */
{cat:"social", text:"Do you ever quote movies during conversations?", options:[
["Never",1],["Sometimes",5],["All the time",9]]},

{cat:"social", text:"Do you use Discord?", options:[
["No",2],["Occasionally",5],["Daily",9]]},

{cat:"social", text:"Have you argued in social media comments?", options:[
["Never",2],["A few times",6],["Often",9]]},

{cat:"social", text:"Do you say 'see you next year' at New Year?", options:[
["No",2],["Once",6],["Every year",9]]},

{cat:"social", text:"Do you get nervous at parties?", options:[
["No",1],["Sometimes",5],["Yes",9]]},

{cat:"social", text:"Made a fan account?", options:[
["No",2],["Yes",9]]},

{cat:"social", text:"Do you practice accents/impersonations?", options:[
["No",2],["Sometimes",6],["Yes often",9]]},

{cat:"social", text:"Were you a theatre kid?", options:[
["No",2],["A bit",6],["Yes",9]]},

{cat:"social", text:"Talk about uni at parties?", options:[
["No",2],["Sometimes",6],["Yes",9]]},

{cat:"social", text:"Quote memes/vines?", options:[
["No",2],["Sometimes",6],["Constantly",9]]},

/* ACADEMIA */
{cat:"academia", text:"Retaken exam for better grade?", options:[
["No",2],["Once",6],["Yes multiple times",9]]},

{cat:"academia", text:"Calculated GPA?", options:[
["No",2],["Yes",9]]},

{cat:"academia", text:"Studied material not on exam?", options:[
["No",2],["Sometimes",6],["Yes",9]]},

{cat:"academia", text:"Do people use your notes?", options:[
["No",2],["Sometimes",6],["Often",10]]},

{cat:"academia", text:"Failed an exam first try?", options:[
["No",9],["Yes",3]]},

{cat:"academia", text:"Failed a test?", options:[
["No",9],["Yes",3]]},

{cat:"academia", text:"Retaken a course?", options:[
["No",9],["Yes",3]]},

{cat:"academia", text:"Study early in silent zones?", options:[
["No",2],["Sometimes",6],["Yes",9]]},

{cat:"academia", text:"Skip lectures?", options:[
["Often",2],["Sometimes",6],["Never",9]]},

{cat:"academia", text:"Attend GSS?", options:[
["No",2],["Sometimes",6],["Always",9]]},

{cat:"academia", text:"Study for grades?", options:[
["Just pass",2],["Mix",6],["Top grades",9]]},

{cat:"academia", text:"Own uni merch?", options:[
["No",2],["Yes",7]]},

{cat:"academia", text:"Corrected a professor?", options:[
["No",2],["Yes",9]]},

{cat:"academia", text:"Lost sleep over exams?", options:[
["No",2],["Sometimes",6],["Yes",9]]},

{cat:"academia", text:"Know digits of pi?", options:[
["No",2],["Yes",8]]},

{cat:"academia", text:"Planning a PhD?", options:[
["No",2],["Maybe",6],["Yes",10]]},

/* HOBBIES */
{cat:"hobbies", text:"Want movie props?", options:[
["No",2],["Yes",9]]},

{cat:"hobbies", text:"Rewatched a movie 3+ times alone?", options:[
["No",2],["Yes",8]]},

{cat:"hobbies", text:"Hours on most played game?", options:[
["Don't play",1],["~100",6],["1000+",10]]},

{cat:"hobbies", text:"Vehicle watching?", options:[
["No",2],["Yes",9]]},

{cat:"hobbies", text:"Gone to conventions?", options:[
["No",2],["Yes",9]]},

{cat:"hobbies", text:"Used Reddit?", options:[
["No",2],["Yes",9]]},

{cat:"hobbies", text:"Enjoy board games?", options:[
["No",2],["Yes",8]]},

{cat:"hobbies", text:"Top Spotify listener?", options:[
["No",2],["Yes",9]]},

{cat:"hobbies", text:"Collected cards?", options:[
["No",2],["Yes",9]]},

{cat:"hobbies", text:"Collected figurines?", options:[
["No",2],["Yes",9]]},

{cat:"hobbies", text:"Duolingo streak 100+?", options:[
["No",2],["Yes",9]]},

{cat:"hobbies", text:"Into mythology?", options:[
["No",2],["Yes",8]]}

];

const quiz = document.getElementById("quiz");
let answers = new Array(questions.length).fill(null);

// Build UI grouped by category
["social","academia","hobbies"].forEach(category => {
    const section = document.createElement("div");
    section.className = "category";

    section.innerHTML = `<h2>${category.toUpperCase()}</h2>`;

    questions.forEach((q, i) => {
        if(q.cat !== category) return;

        const div = document.createElement("div");
        div.className = "question";

        div.innerHTML = `<p>${q.text}</p>`;
        const optDiv = document.createElement("div");
        optDiv.className = "options";

        q.options.forEach(([label, score], j) => {
            const btn = document.createElement("button");
            btn.innerText = label;

            btn.onclick = () => {
                answers[i] = score;
                [...optDiv.children].forEach(b=>b.classList.remove("selected"));
                btn.classList.add("selected");
            };

            optDiv.appendChild(btn);
        });

        div.appendChild(optDiv);
        section.appendChild(div);
    });

    quiz.appendChild(section);
});

function avg(arr){
    return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0;
}

function calculateScore(){
    let social=[], academia=[], hobbies=[];

    questions.forEach((q,i)=>{
        if(answers[i]===null) return;
        if(q.cat==="social") social.push(answers[i]);
        if(q.cat==="academia") academia.push(answers[i]);
        if(q.cat==="hobbies") hobbies.push(answers[i]);
    });

    let score = (avg(social)*1.1 + avg(academia)*0.8 + avg(hobbies)*1.1)/3;

    document.getElementById("result").innerText =
        "Your Neek Score: " + score.toFixed(2);
}

</script>

</body>
</html>
